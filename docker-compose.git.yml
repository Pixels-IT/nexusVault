# docker-compose.git.yml — builder depuis les sources locales
# Usage : docker compose -f docker-compose.git.yml up -d --build

# Pour builder depuis les sources : docker compose -f docker-compose.git.yml up -d --build
# Remplacer pixelsia par votre identifiant Docker Hub

services:

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nexusvault-backend
    restart: unless-stopped
    environment:
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:?ENCRYPTION_KEY manquante - voir .env.example}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET manquant - voir .env.example}
      DB_PATH: /data/nexusvault.db
      LOG_LEVEL: ${LOG_LEVEL:-info}
      APP_URL: ${APP_URL:-http://localhost:8080}
      PORT: 3001
      NODE_ENV: production
      TZ: ${TZ:-Europe/Paris}
    volumes:
      - nexusvault-data:/data
    networks:
      - nexusvault-net
    expose:
      - "3001"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s

  frontend:
    build:
      context: ./frontend
      args:
        CACHEBUST: ${CACHEBUST:-1}
      dockerfile: Dockerfile
    container_name: nexusvault-frontend
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:8080"
    environment:
      TZ: ${TZ:-Europe/Paris}
    healthcheck:
      test: ["CMD", "curl", "-f", "-s", "http://localhost:8080/"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
    depends_on:
      - backend
    networks:
      - nexusvault-net

volumes:
  nexusvault-data:
    driver: local

networks:
  nexusvault-net:
    driver: bridge
