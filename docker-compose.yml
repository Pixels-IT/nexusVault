services:

  # ── BACKEND (Node.js + SQLite) ──────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nexusvault-backend
    restart: unless-stopped
    environment:
      # Clé de chiffrement AES-256 pour les données sensibles en base SQLite.
      # OBLIGATOIRE : changez cette valeur avant le premier démarrage.
      # Générer une clé : openssl rand -hex 32
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-CHANGEZ-CETTE-CLE-MAINTENANT-32chars!!}

      # Secret JWT pour les tokens de session.
      # Générer : openssl rand -hex 32
      JWT_SECRET: ${JWT_SECRET:-CHANGEZ-CE-SECRET-JWT-AVANT-PROD!!}

      DB_PATH: /data/nexusvault.db
      LOG_LEVEL: ${LOG_LEVEL:-info}
      APP_URL: ${APP_URL:-http://localhost:8080}
      PORT: 3001
      NODE_ENV: production

      # Fuseau horaire du serveur — modifiable dans .env
      # Exemples : Europe/Paris, America/New_York, Asia/Tokyo, UTC
      TZ: ${TZ:-Europe/Paris}

    volumes:
      - nexusvault-data:/data
    networks:
      - nexusvault-net
    expose:
      - "3001"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ── FRONTEND (React + Nginx) ────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      args:
        CACHEBUST: 20260501155344
      dockerfile: Dockerfile
    container_name: nexusvault-frontend
    restart: unless-stopped
    ports:
      # Modifiez APP_PORT dans le fichier .env pour changer le port d'écoute.
      - "${APP_PORT:-8080}:8080"
    environment:
      TZ: ${TZ:-Europe/Paris}
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - nexusvault-net

# ── VOLUMES ──────────────────────────────────────────────────────────────────
volumes:
  nexusvault-data:
    driver: local

# ── RÉSEAU INTERNE ───────────────────────────────────────────────────────────
networks:
  nexusvault-net:
    driver: bridge
